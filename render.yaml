services:
  - type: web
    name: ai-financial-advisor-backend
    env: docker
    dockerfilePath: ./backend/websearch_service/Dockerfile
    dockerContext: ./backend/websearch_service
    plan: starter
    region: oregon
    buildCommand: ""
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: 0.1.0
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: AI_AUDIT_LOG_PATH
        value: /app/logs/audit.jsonl
