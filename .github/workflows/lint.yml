name: Lint & Type Check

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint (zero warnings)
        run: npm run lint:ci

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Check for excessive lint-disable comments
        run: |
          count=$(grep -R "eslint-disable" src/ --include="*.ts" --include="*.tsx" | wc -l)
          echo "Found $count eslint-disable comments"
          if [ "$count" -gt 10 ]; then
            echo "::error::Too many eslint-disable comments ($count). Review and justify each one."
            grep -Rn "eslint-disable" src/ --include="*.ts" --include="*.tsx"
            exit 1
          fi
