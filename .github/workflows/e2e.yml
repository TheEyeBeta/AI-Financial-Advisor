name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: ${{ vars.NPM_REGISTRY_URL }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm registry/auth
        run: |
          npm config set registry "${NPM_REGISTRY_URL:-https://registry.npmjs.org/}"
          npm config delete proxy || true
          npm config delete https-proxy || true
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi

      - run: npm ci
      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
