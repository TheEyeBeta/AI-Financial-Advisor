name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Frontend: Lint + Type Check + Test + Build ──────────────────────────
  frontend:
    name: Frontend Quality & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          # Skip optional dep postinstall (Railway CLI binary download, Vercel CLI)
          npm_config_ignore_scripts: true

      - name: Run ESLint (zero warnings)
        run: npm run lint:ci

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PYTHON_API_URL: ${{ secrets.VITE_PYTHON_API_URL }}
          VITE_WEBSEARCH_API_URL: ${{ secrets.VITE_WEBSEARCH_API_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ─── Backend: Lint + Test ────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/websearch_service/requirements.txt

      - name: Install dependencies
        working-directory: ./backend/websearch_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: ./backend/websearch_service
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/websearch_service/coverage.xml
          flags: backend
          name: backend-coverage

  # ─── Docker Build Test ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/websearch_service
          file: ./backend/websearch_service/Dockerfile
          push: false
          tags: ai-financial-advisor-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scanning ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Audit npm dependencies
        # --omit=optional: vercel and @railway/cli are optional CLI tools,
        # not runtime deps — their transitive vulns are not exploitable.
        run: npm audit --omit=dev --omit=optional --audit-level=high || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
